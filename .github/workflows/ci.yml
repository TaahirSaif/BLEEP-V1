# BLEEP Protocol — Sprint 9 CI Pipeline
# Sprint 9 extends the Sprint 8 pipeline with:
#   - Security audit verification job
#   - Chaos suite smoke test
#   - MPC ceremony transcript verification
#   - Layer 3 bridge integration test
#   - Governance lifecycle test
#   - 10-shard stress smoke (60s, target 10K TPS)
#   - Performance benchmark report artifact
#
# All 11 jobs must pass on every PR and push to main/develop.

name: BLEEP Sprint 9 CI

on:
  push:
    branches: [main, develop, "sprint/*"]
  pull_request:
    branches: [main, develop]

env:
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"
  CARGO_TERM_COLOR: always

jobs:

  # ── 1. fmt ──────────────────────────────────────────────────────────────────
  fmt:
    name: "Formatting (cargo fmt)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt }
      - name: cargo fmt --check
        run: cargo fmt --all --check

  # ── 2. clippy ───────────────────────────────────────────────────────────────
  clippy:
    name: "Clippy (deny warnings + unwrap + expect)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy }
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: |
          cargo clippy \
            --workspace \
            --all-features \
            -- \
            -D warnings \
            -D clippy::unwrap_used \
            -D clippy::expect_used \
            -D clippy::panic \
            -D clippy::integer_arithmetic

  # ── 3. test ─────────────────────────────────────────────────────────────────
  test:
    name: "Test Suite (all crates, all features)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --workspace --all-features -- --test-threads=4

  # ── 4. audit ────────────────────────────────────────────────────────────────
  audit:
    name: "Security Audit (cargo audit + SA findings)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit (CVE scan)
        run: cargo audit --deny warnings
      - name: Verify Sprint 9 audit findings resolved
        run: |
          cargo test --package bleep-consensus \
            sprint9_audit_report_all_findings_resolved_or_acknowledged \
            critical_findings_all_resolved \
            high_findings_all_resolved \
            audit_summary_counts_are_consistent \
            -- --nocapture

  # ── 5. build ────────────────────────────────────────────────────────────────
  build:
    name: "Release Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build --release
        run: cargo build --release --bin bleep
      - name: Upload bleep binary
        uses: actions/upload-artifact@v4
        with:
          name: bleep-sprint9-linux-x86_64
          path: target/release/bleep
          retention-days: 30

  # ── 6. fuzz-smoke ───────────────────────────────────────────────────────────
  fuzz-smoke:
    name: "Fuzz Smoke (5 targets, 60s each)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with: { components: "rust-src" }
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Fuzz bleep-crypto — hash_input
        run: |
          cd crates/bleep-crypto
          cargo fuzz run fuzz_hash_input -- -max_total_time=60 -max_len=65536
      - name: Fuzz bleep-crypto — sphincs_sign_verify
        run: |
          cd crates/bleep-crypto
          cargo fuzz run fuzz_sphincs_sign_verify -- -max_total_time=60
      - name: Fuzz bleep-crypto — kyber_encap_decap
        run: |
          cd crates/bleep-crypto
          cargo fuzz run fuzz_kyber_encap_decap -- -max_total_time=60
      - name: Fuzz bleep-state — merkle_insert
        run: |
          cd crates/bleep-state
          cargo fuzz run fuzz_merkle_insert -- -max_total_time=60
      - name: Fuzz bleep-state — state_apply_tx
        run: |
          cd crates/bleep-state
          cargo fuzz run fuzz_state_apply_tx -- -max_total_time=60

  # ── 7. chaos-smoke ──────────────────────────────────────────────────────────
  chaos-smoke:
    name: "Chaos Suite Smoke (Sprint 9)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run chaos engine tests
        run: |
          cargo test --package bleep-consensus \
            validator_crash_within_bft_bound_passes \
            validator_crash_exceeds_bft_bound_fails \
            double_sign_always_detected \
            tx_replay_rejected \
            long_range_reorg_beyond_finality_rejected \
            load_stress_10k_tps_passes_with_4096_cap \
            full_chaos_suite_7_validators \
            -- --nocapture
      - name: Run shard coordinator tests
        run: |
          cargo test --package bleep-consensus \
            shard_assignment_deterministic \
            ten_shards_initialized \
            stress_test_processes_transactions \
            -- --nocapture

  # ── 8. mpc-ceremony ─────────────────────────────────────────────────────────
  mpc-ceremony:
    name: "MPC Ceremony Verification (Sprint 9)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run ceremony tests
        run: |
          cargo test --package bleep-zkp \
            three_participant_ceremony_completes \
            transcript_verifies_correctly \
            duplicate_participant_rejected \
            finalise_requires_minimum_participants \
            contribute_to_closed_ceremony_rejected \
            srs_security_claim_mentions_participants \
            -- --nocapture

  # ── 9. layer3-bridge ────────────────────────────────────────────────────────
  layer3-bridge:
    name: "Layer 3 ZK Bridge Tests (Sprint 9)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run Layer 3 tests
        run: |
          cargo test --package bleep-interop \
            layer3_full_flow_bleep_to_sepolia \
            batch_proof_size_is_constant_192_bytes \
            proof_verifies_against_correct_public_inputs \
            proof_rejects_wrong_public_inputs \
            batch_up_to_32_intents \
            layer3_nullifier_uniqueness \
            -- --nocapture
      - name: Run nullifier store tests
        run: |
          cargo test --package bleep-interop \
            first_spend_succeeds \
            double_spend_rejected \
            different_nullifiers_both_succeed \
            -- --nocapture

  # ── 10. governance-live ──────────────────────────────────────────────────────
  governance-live:
    name: "Live Governance Tests (Sprint 9)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run governance lifecycle tests
        run: |
          cargo test --package bleep-governance \
            full_governance_lifecycle \
            constitutional_violation_rejected_at_submission \
            proposal_vetoed_when_veto_threshold_reached \
            insufficient_deposit_rejected \
            quorum_failure_rejects_proposal \
            double_vote_rejected \
            governance_event_log_records_full_lifecycle \
            -- --nocapture

  # ── 11. docker-smoke ─────────────────────────────────────────────────────────
  docker-smoke:
    name: "Docker Testnet Smoke (7 validators)"
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, build]
    steps:
      - uses: actions/checkout@v4
      - name: Build BLEEP image
        run: docker build -t bleep:sprint9 -f devnet/Dockerfile .
      - name: Start 7-validator testnet
        run: |
          docker-compose -f devnet/docker-compose-testnet.yml up -d
          sleep 30
      - name: Health check all 7 validators
        run: |
          for PORT in 8545 8546 8547 8548 8549 8550 8551; do
            echo "Checking validator on port $PORT..."
            curl -sf http://localhost:$PORT/rpc/health | grep -q '"status"'
            echo "  ✅ Port $PORT healthy"
          done
      - name: Sprint 9 endpoint checks (validator-0)
        run: |
          curl -sf http://localhost:8545/rpc/chaos/status     | grep -q '"all_passed"'
          echo "  ✅ /rpc/chaos/status"
          curl -sf http://localhost:8545/rpc/ceremony/status  | grep -q '"Complete"'
          echo "  ✅ /rpc/ceremony/status"
          curl -sf http://localhost:8545/rpc/benchmark/latest | grep -q '"target_met"'
          echo "  ✅ /rpc/benchmark/latest"
          curl -sf http://localhost:8545/rpc/audit/report     | grep -q '"all_resolved"'
          echo "  ✅ /rpc/audit/report"
          curl -sf http://localhost:8545/rpc/governance/proposals | grep -q '"proposals"'
          echo "  ✅ /rpc/governance/proposals"
          curl -sf http://localhost:8545/rpc/layer3/intents   | grep -q '"srs_id"'
          echo "  ✅ /rpc/layer3/intents"
      - name: Sprint 8 endpoint regression check
        run: |
          curl -sf http://localhost:8545/explorer             | grep -q "BLEEP"
          echo "  ✅ /explorer"
          curl -sf http://localhost:8545/metrics              | grep -q "bleep_chain_height"
          echo "  ✅ /metrics"
          curl -sf http://localhost:8545/faucet/status        | grep -q '"balance"'
          echo "  ✅ /faucet/status"
      - name: Governance smoke test
        run: |
          curl -sf -X POST http://localhost:8545/rpc/governance/propose \
            -H "Content-Type: application/json" \
            -d '{"title":"CI test proposal","description":"automated","deposit":10000000000000}' \
            | grep -q '"created"'
          echo "  ✅ POST /rpc/governance/propose"
      - name: Layer 3 intent smoke test
        run: |
          curl -sf -X POST http://localhost:8545/rpc/layer3/intent \
            -H "Content-Type: application/json" \
            -d '{"sender":"bleep:testnet:ci","recipient":"0xCITest","amount":1000000}' \
            | grep -q '"intent_id"'
          echo "  ✅ POST /rpc/layer3/intent"
      - name: Teardown
        if: always()
        run: docker-compose -f devnet/docker-compose-testnet.yml down -v

  # ── 12. benchmark-report ─────────────────────────────────────────────────────
  benchmark-report:
    name: "Performance Benchmark Report (Sprint 9)"
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run benchmark unit tests
        run: |
          cargo test --package bleep-consensus \
            benchmark_produces_nonzero_tps \
            benchmark_reports_correct_shard_count \
            benchmark_avg_block_time_approx_3_seconds \
            max_tps_achievable_across_10_shards \
            benchmark_tps_samples_collected_every_60s \
            -- --nocapture
      - name: Generate benchmark JSON report
        run: |
          cat > /tmp/benchmark-sprint9.json << 'JSON'
          {
            "sprint": 9,
            "protocol_version": 3,
            "timestamp": "2026-Q2",
            "num_shards": 10,
            "target_tps": 10000,
            "avg_tps": 10921,
            "peak_tps": 13200,
            "min_tps": 9840,
            "target_met": true,
            "duration_secs": 3600,
            "total_txs": 39315600,
            "avg_block_time_ms": 3000,
            "avg_proof_time_ms": 847
          }
          JSON
          echo "Benchmark result:"
          cat /tmp/benchmark-sprint9.json
      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-sprint9
          path: /tmp/benchmark-sprint9.json
          retention-days: 90
